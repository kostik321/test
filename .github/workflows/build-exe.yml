name: Build UniPro POS Server EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger

jobs:
  build-exe:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pystray Pillow
    
    - name: Fix encoding in main.py
      run: |
        # Read and fix encoding issues
        $content = Get-Content -Path 'main.py' -Encoding UTF8 -Raw
        
        # Replace problematic characters
        $content = $content -replace 'Ð', 'О'
        $content = $content -replace 'Ñ', 'п'
        $content = $content -replace '†', 'І'
        $content = $content -replace '®', 'р'
        
        # Fix log file path for Windows
        $content = $content -replace '/app/tcp_4000\.log', './tcp_4000.log'
        
        # Write back
        Set-Content -Path 'main.py' -Value $content -Encoding UTF8
    
    - name: Create PyInstaller spec file
      run: |
        @'
        # -*- mode: python ; coding: utf-8 -*-
        
        a = Analysis(
            ['main.py'],
            pathex=[],
            binaries=[],
            datas=[
                ('config.py', '.'),
                ('data_processor.py', '.'),
                ('receipt_formatter.py', '.'),
            ],
            hiddenimports=['pystray', 'PIL', 'PIL._tkinter_finder'],
            hookspath=[],
            hooksconfig={},
            runtime_hooks=[],
            excludes=[],
            noarchive=False,
        )
        
        pyz = PYZ(a.pure)
        
        exe = EXE(
            pyz,
            a.scripts,
            a.binaries,
            a.datas,
            [],
            name='UniPro_POS_Server_GUI',
            debug=False,
            bootloader_ignore_signals=False,
            strip=False,
            upx=True,
            upx_exclude=[],
            runtime_tmpdir=None,
            console=False,
            disable_windowed_traceback=False,
            argv_emulation=False,
            target_arch=None,
            codesign_identity=None,
            entitlements_file=None,
        )
        '@ | Out-File -FilePath 'pos_server.spec' -Encoding UTF8
    
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller pos_server.spec
    
    - name: Test EXE exists
      run: |
        if (Test-Path "dist/UniPro_POS_Server_GUI.exe") {
            Write-Host "✅ EXE file created successfully!"
            Get-ChildItem "dist/UniPro_POS_Server_GUI.exe" | Format-List
        } else {
            Write-Host "❌ EXE file not found!"
            Write-Host "Contents of dist folder:"
            if (Test-Path "dist") {
                Get-ChildItem "dist" | Format-List
            } else {
                Write-Host "dist folder does not exist"
            }
            exit 1
        }
    
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: UniPro_POS_Server_Windows
        path: dist/UniPro_POS_Server_GUI.exe
        retention-days: 30
